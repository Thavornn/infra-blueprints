x-default-opts: &default-opts
  logging:
    options:
      max-size: "100m"

networks:
  postgres:
    driver: overlay
  backend:
    driver: overlay

services:
  {SERVICE_NAME}:
    image: ${POSTGRES_IMAGE}
    volumes:
      - ${POSTGRES_VOLUME_PATH}:/var/lib/postgresql
      - ${POSTGRES_ARCHIVE_PATH}:/mnt/server/archive
      - ${POSTGRES_DUMP_PATH}:/mnt/dump
      - ${SSH_KEYS_PATH}:/utils/ssh
      - ./utils/:/utils
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
      - .env:/docker-entrypoint-initdb.d/.env
    ports:
      - ${POSTGRES_PORT}:5432
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - backend
      - postgres
